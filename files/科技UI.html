<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Test 5</title>
    <style>
        /* 针对所有元素隐藏滚动条 */
        * {
            /* 针对 Firefox */
            scrollbar-width: none;
            /* 针对 IE 和旧版 Edge */
            -ms-overflow-style: none;
        }

        /* 针对 Chrome, Safari, 和新版 Edge (WebKit/Blink) */
        *::-webkit-scrollbar {
            display: none;
        }

        .shader-credits {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            /* 确保在 Canvas 之上 */
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            /* 半透明黑背景 */
            color: rgba(255, 255, 255, 0.8);
            /* 文字略微透明，不抢戏 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: auto;
            /* 允许点击链接 */
            backdrop-filter: blur(4px);
            /* 背景模糊，增加高级感 */
            transition: background 0.3s ease;
        }

        .shader-credits:hover {
            background: rgba(0, 0, 0, 0.8);
            /* 鼠标悬停时变深 */
        }

        .shader-credits a {
            color: #00aaff;
            /* 链接颜色 */
            text-decoration: none;
            font-weight: bold;
        }

        .shader-credits a:hover {
            text-decoration: underline;
        }
    </style>
